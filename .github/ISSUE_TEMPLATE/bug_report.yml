name: Bug Report
description: Report a bug in LatticeStripe
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below.
  - type: input
    id: version
    attributes:
      label: LatticeStripe Version
      description: "Which version of LatticeStripe are you using?"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: elixir-version
    attributes:
      label: Elixir / OTP Version
      description: "Output of `elixir --version`"
      placeholder: "Elixir 1.19.5 (compiled with Erlang/OTP 28)"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A clear description of the bug."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Minimal steps to reproduce the behavior."
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What you expected to happen."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened. Include error messages and stack traces."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Any other context, logs, or screenshots."
    validations:
      required: false
